{% extends "base.html" %}

{% block title %}查询日志 - 防篡改审计日志系统{% endblock %}

{% block content %}
    <div class="card">
        <div class="card-header">
            <h2 class="card-title">🔍 查询日志条目</h2>
            <span class="badge badge-info">当前日志总数: {{ tree_size }}</span>
        </div>
        
        <form id="query-form">
            <div class="form-group">
                <label class="form-label">日志索引</label>
                <input type="number" class="form-control" id="log-index" min="0" placeholder="请输入日志索引" required>
            </div>
            
            <button type="submit" class="btn btn-primary">查询日志</button>
        </form>
    </div>

    <!-- 查询结果 -->
    <div id="result" style="display: none;">
        <div class="card" id="result-card">
            <div id="result-content"></div>
        </div>
    </div>

    <!-- 快速查询最近日志 -->
    <div class="card">
        <div class="card-header">
            <h2 class="card-title">⚡ 快速查询</h2>
        </div>
        <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
            <button class="btn btn-secondary" onclick="queryFirst()">第一条</button>
            <button class="btn btn-secondary" onclick="queryLast()">最后一条</button>
            {% if tree_size > 10 %}
                <button class="btn btn-secondary" onclick="queryMiddle()">中间位置</button>
            {% endif %}
        </div>
    </div>
{% endblock %}

{% block extra_js %}
    <script>
        const treeSize = parseInt('{{ tree_size | default(0) }}') || 0;
        
        async function queryLog(index) {
            document.getElementById('log-index').value = index;
            
            const resultDiv = document.getElementById('result');
            const resultCard = document.getElementById('result-card');
            const resultContent = document.getElementById('result-content');
            
            try {
                resultCard.className = 'card';
                resultContent.innerHTML = '<div class="loader"></div>';
                resultDiv.style.display = 'block';
                
                const response = await fetchJSON(`/api/log/${index}`);
                
                if (response.success) {
                    resultCard.className = 'card';
                    resultContent.innerHTML = `
                        <h3>📄 日志详情</h3>
                        <div class="grid grid-2" style="margin-top: 1rem;">
                            <div>
                                <p><strong>索引:</strong> ${response.index}</p>
                            </div>
                        </div>
                        <div style="margin-top: 1rem;">
                            <p><strong>内容:</strong></p>
                            <pre style="background: rgba(0,0,0,0.3); padding: 1rem; border-radius: 8px; overflow-x: auto;">${escapeHtml(response.data)}</pre>
                        </div>
                    `;
                } else {
                    resultCard.className = 'card alert alert-danger';
                    resultContent.innerHTML = `<p>❌ ${response.message}</p>`;
                }
            } catch (error) {
                resultCard.className = 'card alert alert-danger';
                resultContent.innerHTML = `<p>❌ 查询失败: ${error.message}</p>`;
            }
        }
        
        function queryFirst() {
            queryLog(0);
        }
        
        function queryLast() {
            const lastIndex = Math.max(0, treeSize - 1);
            queryLog(lastIndex);
        }
        
        function queryMiddle() {
            const middleIndex = Math.floor(treeSize / 2);
            queryLog(middleIndex);
        }
        
        document.getElementById('query-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const index = parseInt(document.getElementById('log-index').value);
            if (!isNaN(index)) {
                await queryLog(index);
            }
        });
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
{% endblock %}
