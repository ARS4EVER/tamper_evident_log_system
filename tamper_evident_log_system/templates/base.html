<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}防篡改审计日志系统{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="/" class="navbar-brand">
                🔐 防篡改审计日志系统
            </a>
            <div class="navbar-nav">
                <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">首页</a>
                <a href="/submit" class="nav-link {% if request.url.path == '/submit' %}active{% endif %}">提交日志</a>
                <a href="/query" class="nav-link {% if request.url.path == '/query' %}active{% endif %}">查询日志</a>
                <a href="/verify" class="nav-link {% if request.url.path == '/verify' %}active{% endif %}">验证证明</a>
                <a href="/audit" class="nav-link {% if request.url.path == '/audit' %}active{% endif %}">审计</a>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <p>防篡改审计日志系统 | Tamper-Evident Audit Log System</p>
    </footer>

    <!-- JavaScript -->
    <script>
        // 通用函数
        async function fetchJSON(url, options = {}) {
            const response = await fetch(url, {
                ...options,
                headers: {
                    'Content-Type': 'application/json',
                    ...options.headers
                }
            });
            return await response.json();
        }

        function showAlert(message, type = 'info') {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.textContent = message;
            document.querySelector('main').prepend(alertDiv);
            setTimeout(() => alertDiv.remove(), 3000);
        }

        function formatHash(hash) {
            return hash ? hash.substring(0, 32) + '...' : 'N/A';
        }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
