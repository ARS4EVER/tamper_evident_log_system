{% extends "base.html" %}

{% block title %}提交日志 - 防篡改审计日志系统{% endblock %}

{% block content %}
    <div class="card">
        <div class="card-header">
            <h2 class="card-title">📝 提交日志条目</h2>
        </div>
        
        <form id="submit-form">
            <div class="form-group">
                <label class="form-label">日志内容</label>
                <textarea class="form-control" id="log-content" placeholder="请输入日志内容..." required></textarea>
            </div>
            
            <button type="submit" class="btn btn-primary">提交日志</button>
        </form>
    </div>

    <!-- 批量提交 -->
    <div class="card">
        <div class="card-header">
            <h2 class="card-title">📦 批量提交日志</h2>
        </div>
        
        <form id="batch-form">
            <div class="form-group">
                <label class="form-label">批量日志内容（每行一条）</label>
                <textarea class="form-control" id="batch-content" placeholder="日志1&#10;日志2&#10;日志3&#10;..." rows="6"></textarea>
            </div>
            
            <button type="submit" class="btn btn-secondary">批量提交</button>
        </form>
    </div>

    <!-- 提交结果 -->
    <div id="result" style="display: none;">
        <div class="card" id="result-card">
            <div id="result-content"></div>
        </div>
    </div>
{% endblock %}

{% block extra_js %}
    <script>
        // 单条提交
        document.getElementById('submit-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const content = document.getElementById('log-content').value.trim();
            if (!content) return;
            
            const resultDiv = document.getElementById('result');
            const resultCard = document.getElementById('result-card');
            const resultContent = document.getElementById('result-content');
            
            try {
                resultCard.className = 'card';
                resultContent.innerHTML = '<div class="loader"></div>';
                resultDiv.style.display = 'block';
                
                const response = await fetchJSON('/api/submit', {
                    method: 'POST',
                    body: JSON.stringify({ data: content })
                });
                
                if (response.success) {
                    resultCard.className = 'card alert alert-success';
                    resultContent.innerHTML = `
                        <h3>✅ 提交成功！</h3>
                        <p>日志索引: <strong>${response.index}</strong></p>
                        <p>${response.message}</p>
                    `;
                    document.getElementById('log-content').value = '';
                } else {
                    resultCard.className = 'card alert alert-danger';
                    resultContent.innerHTML = `<p>❌ ${response.message}</p>`;
                }
            } catch (error) {
                resultCard.className = 'card alert alert-danger';
                resultContent.innerHTML = `<p>❌ 提交失败: ${error.message}</p>`;
            }
        });
        
        // 批量提交
        document.getElementById('batch-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const content = document.getElementById('batch-content').value.trim();
            if (!content) return;
            
            const lines = content.split('\n').filter(line => line.trim());
            if (lines.length === 0) return;
            
            const resultDiv = document.getElementById('result');
            const resultCard = document.getElementById('result-card');
            const resultContent = document.getElementById('result-content');
            
            try {
                resultCard.className = 'card';
                resultContent.innerHTML = '<div class="loader"></div>';
                resultDiv.style.display = 'block';
                
                const entries = lines.map(line => ({ data: line.trim() }));
                const response = await fetchJSON('/api/submit/batch', {
                    method: 'POST',
                    body: JSON.stringify(entries)
                });
                
                if (response.success) {
                    resultCard.className = 'card alert alert-success';
                    resultContent.innerHTML = `
                        <h3>✅ 批量提交成功！</h3>
                        <p>成功提交 <strong>${response.count}</strong> 条日志</p>
                        <p>索引范围: ${response.indices[0]} - ${response.indices[response.indices.length - 1]}</p>
                    `;
                    document.getElementById('batch-content').value = '';
                } else {
                    resultCard.className = 'card alert alert-danger';
                    resultContent.innerHTML = `<p>❌ ${response.message}</p>`;
                }
            } catch (error) {
                resultCard.className = 'card alert alert-danger';
                resultContent.innerHTML = `<p>❌ 批量提交失败: ${error.message}</p>`;
            }
        });
    </script>
{% endblock %}
